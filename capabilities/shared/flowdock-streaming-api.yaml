naftiko: 1.0.0-alpha2
info:
  label: Flowdock Streaming API (Shared)
  description: |
    Shared Naftiko capability for the Flowdock Streaming API. Long-lived
    HTTP connection delivering real-time flow events (message, status,
    comment, file, activity, discussion, tag-change, message-edit) as
    newline-delimited JSON or Server-Sent Events. Service discontinued
    2023-08-15.
  tags:
    - Flowdock
    - Streaming
    - RealTime
    - Discontinued
  created: '2026-05-22'
  modified: '2026-05-22'
status: discontinued
binds:
  - namespace: env
    keys:
      FLOWDOCK_API_TOKEN: FLOWDOCK_API_TOKEN
capability:
  consumes:
    - type: http
      namespace: flowdock-stream
      baseUri: https://stream.flowdock.com
      resources:
        - name: streamFlows
          path: /flows
          operations:
            - name: streamFlows
              method: GET
              description: Stream events from one or more flows (filter query parameter).
              outputRawFormat: text
        - name: streamFlow
          path: /flows/{organization}/{flow}
          operations:
            - name: streamFlow
              method: GET
              description: Stream events from a single flow.
              outputRawFormat: text
  exposes:
    - type: stream
