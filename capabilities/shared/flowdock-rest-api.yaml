naftiko: 1.0.0-alpha2
info:
  label: Flowdock REST API (Shared)
  description: |
    Shared Naftiko capability for the historical Flowdock REST API.
    Provides flow listing, messaging, threads, sources, invitations, users,
    and organizations. Hosted service was discontinued 2023-08-15;
    this capability exists for archival and migration planning use.
  tags:
    - Flowdock
    - Chat
    - TeamInbox
    - Discontinued
  created: '2026-05-22'
  modified: '2026-05-22'
status: discontinued
binds:
  - namespace: env
    keys:
      FLOWDOCK_API_TOKEN: FLOWDOCK_API_TOKEN
capability:
  consumes:
    - type: http
      namespace: flowdock-rest
      baseUri: https://api.flowdock.com
      description: Flowdock REST API base URL.
      resources:
        - name: flows
          path: /flows
          operations:
            - name: listFlows
              method: GET
              description: List flows the authenticated user has joined.
              outputRawFormat: json
        - name: flowMessages
          path: /flows/{organization}/{flow}/messages
          operations:
            - name: listFlowMessages
              method: GET
              description: List messages in a flow.
              outputRawFormat: json
            - name: sendFlowMessage
              method: POST
              description: Send a message into a flow.
              outputRawFormat: json
        - name: messages
          path: /messages
          operations:
            - name: sendMessage
              method: POST
              description: Send a message (flow specified in body).
              outputRawFormat: json
        - name: sources
          path: /flows/{organization}/{flow}/sources
          operations:
            - name: listSources
              method: GET
            - name: createSource
              method: POST
        - name: invitations
          path: /flows/{organization}/{flow}/invitations
          operations:
            - name: listInvitations
              method: GET
            - name: createInvitation
              method: POST
        - name: users
          path: /users
          operations:
            - name: listUsers
              method: GET
        - name: organizations
          path: /organizations
          operations:
            - name: listOrganizations
              method: GET
  exposes:
    - type: rest
