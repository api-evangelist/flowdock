naftiko: 1.0.0-alpha2
info:
  label: Flowdock SCIM API (Shared)
  description: |
    Shared Naftiko capability for the Flowdock SCIM 1.x provisioning API,
    available only to CA Flowdock Enterprise customers with SSO configured.
    Supports list, create, get, update, and deactivate of SSO-linked users.
    Service discontinued 2023-08-15.
  tags:
    - Flowdock
    - SCIM
    - SSO
    - Provisioning
    - Discontinued
  created: '2026-05-22'
  modified: '2026-05-22'
status: discontinued
binds:
  - namespace: env
    keys:
      FLOWDOCK_SCIM_TOKEN: FLOWDOCK_SCIM_TOKEN
      FLOWDOCK_SCIM_UID: FLOWDOCK_SCIM_UID
capability:
  consumes:
    - type: http
      namespace: flowdock-scim
      baseUri: https://api.flowdock.com
      resources:
        - name: scimUsers
          path: /scim/{uid}/Users
          operations:
            - name: listScimUsers
              method: GET
            - name: createScimUser
              method: POST
        - name: scimUser
          path: /scim/{uid}/Users/{id}
          operations:
            - name: getScimUser
              method: GET
            - name: updateScimUser
              method: PUT
            - name: deleteScimUser
              method: DELETE
  exposes:
    - type: rest
